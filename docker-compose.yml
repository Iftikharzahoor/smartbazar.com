version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: shopmern-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:alpine
    container_name: shopmern-redis
    ports:
      - "6379:6379"
    restart: always

  server:
    build: ./server
    container_name: shopmern-server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/shopmern
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=shopmern_super_secret_jwt_key_32_characters_minimum
      - JWT_REFRESH_SECRET=shopmern_super_secret_jwt_refresh_key_32_characters_minimum
    depends_on:
      - mongo
      - redis
    restart: always

  client:
    build: ./client
    container_name: shopmern-client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: always

volumes:
  mongo-data:
